<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="app">
    <div class="card">

      <h1>🌤️ Weather App</h1>

      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Buscar ciudad(es)..."
        >
        <button id="searchBtn">Buscar</button>
      </div>
      <p class="hint">💡 Tip: Busca una ciudad (ej: Madrid) o varias separadas por comas (ej: Madrid, Barcelona, Sevilla)</p>

      <div id="result" class="result"></div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
